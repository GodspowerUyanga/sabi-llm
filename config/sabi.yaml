# =============================================================================
# Sabi configuration  —  Africa Deep Tech Challenge 2026
# Track: Corporate / Enterprise  (knowledge-work productivity for SMEs)
#
# Every value here is auditable. Defaults are tuned to stay well under the
# 7 GB RAM ceiling on the ADTC Standard Laptop (8 GB, integrated graphics).
# =============================================================================

model:
  name: "Sabi-1"
  path: "models/sabi-1.gguf"
  n_ctx: 8192          # context window (tokens)
  n_threads: 0         # 0 = auto-detect physical cores
  n_batch: 256         # prompt batch size (lower = lower peak RAM)
  use_mmap: true       # memory-map weights -> keeps resident RAM low
  use_mlock: false
  temperature: 0.3     # low temp = factual, consistent enterprise answers
  top_p: 0.9
  max_tokens: 640
  repeat_penalty: 1.18  # stops runaway repetition on small models
  n_gpu_layers: 0      # no discrete GPU on target hardware
  ram_budget_gb: 7.0   # hard ceiling; benchmark fails the run if exceeded

embedding:
  name: "bge-small-en-v1.5"
  path: "models/embedding.gguf"
  n_ctx: 512
  lazy: true           # load only when indexing/searching, then release

rag:
  corpus_dir: "data/corpus"
  index_dir: "data/index"
  chunk_size: 700
  chunk_overlap: 120
  top_k: 4
  min_score: 0.35
  enabled: true

agent:
  max_steps: 4
  enable_tools: true

language:
  default: "en"
  supported: ["en", "pcm"]   # English (primary) + Nigerian Pidgin
  auto_detect: true

server:
  host: "127.0.0.1"
  port: 8000
